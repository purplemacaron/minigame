<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>BoardBoard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    background:#ffffff;
    font-family:'Noto Sans KR', sans-serif;
    text-align:center;
}

header{
    padding:20px;
    font-size:32px;
    font-weight:700;
    color:#555;
}

.menu{
    margin-bottom:20px;
}

button{
    border:none;
    padding:10px 20px;
    margin:5px;
    border-radius:10px;
    background:#ffd6e0;
    font-size:16px;
    cursor:pointer;
}

button:nth-child(2){
    background:#d6f0ff;
}

canvas{
    background:#fafafa;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>BoardBoard</header>

<div class="menu">
<button onclick="startBreakout()">벽돌깨기</button>
<button onclick="startPong()">핑퐁</button>
</div>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameLoop;

function clearLoop(){
    cancelAnimationFrame(gameLoop);
}

/* -------------------- 벽돌깨기 -------------------- */

function startBreakout(){

clearLoop();

let paddleX = 250;
let ballX = 300;
let ballY = 200;
let dx = 3;
let dy = -3;

const paddleWidth = 100;
const paddleHeight = 10;

let bricks = [];
for(let r=0;r<5;r++){
    for(let c=0;c<8;c++){
        bricks.push({
            x: c*70+30,
            y: r*25+40,
            alive:true
        });
    }
}

document.onmousemove = e=>{
    const rect = canvas.getBoundingClientRect();
    paddleX = e.clientX - rect.left - paddleWidth/2;
};

function draw(){

ctx.clearRect(0,0,600,400);

/* paddle */
ctx.fillStyle="#b5ead7";
ctx.fillRect(paddleX,380,paddleWidth,paddleHeight);

/* ball */
ctx.beginPath();
ctx.arc(ballX,ballY,8,0,Math.PI*2);
ctx.fillStyle="#ffaaa5";
ctx.fill();

/* bricks */
ctx.fillStyle="#c7ceea";
bricks.forEach(b=>{
    if(b.alive){
        ctx.fillRect(b.x,b.y,60,15);
    }
});

/* collision */

bricks.forEach(b=>{
if(b.alive &&
ballX>b.x && ballX<b.x+60 &&
ballY>b.y && ballY<b.y+15){
dy=-dy;
b.alive=false;
}
});

if(ballX<0 || ballX>600) dx=-dx;
if(ballY<0) dy=-dy;

if(ballY>380 && ballX>paddleX && ballX<paddleX+paddleWidth){
dy=-dy;
}

ballX+=dx;
ballY+=dy;

gameLoop=requestAnimationFrame(draw);
}

draw();
}


/* -------------------- PONG -------------------- */

function startPong(){

clearLoop();

let paddleY=160;
let aiY=160;

let ballX=300;
let ballY=200;

let dx=4;
let dy=3;

document.onmousemove=e=>{
const rect=canvas.getBoundingClientRect();
paddleY=e.clientY-rect.top-40;
};

function draw(){

ctx.clearRect(0,0,600,400);

/* player */
ctx.fillStyle="#ffd6a5";
ctx.fillRect(10,paddleY,10,80);

/* AI */
ctx.fillStyle="#a0c4ff";
ctx.fillRect(580,aiY,10,80);

/* ball */
ctx.beginPath();
ctx.arc(ballX,ballY,8,0,Math.PI*2);
ctx.fillStyle="#ffadad";
ctx.fill();

/* AI movement */
aiY += (ballY-aiY-40)*0.05;

/* collision */
if(ballY<0 || ballY>400) dy=-dy;

if(ballX<20 && ballY>paddleY && ballY<paddleY+80){
dx=-dx;
}

if(ballX>580 && ballY>aiY && ballY<aiY+80){
dx=-dx;
}

ballX+=dx;
ballY+=dy;

gameLoop=requestAnimationFrame(draw);
}

draw();
}

</script>

</body>
</html>
